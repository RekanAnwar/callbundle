# Continuous integration: format, analyze, and test every package in the
# melos monorepo on pushes and pull requests targeting main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Verify formatting
        run: melos exec -- "dart format --output=none --set-exit-if-changed ."

      - name: Analyze
        run: melos exec -- "flutter analyze"

      - name: Test
        run: melos exec --dir-exists=test -- "flutter test"

  build-android-example:
    name: Build Android example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build example APK (validates Android/Kotlin)
        working-directory: example
        run: flutter build apk --debug
