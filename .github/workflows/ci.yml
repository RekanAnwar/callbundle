# Continuous integration: format, analyze, and test the CallBundle packages on
# pushes and pull requests targeting main.
#
# Notes:
# * `melos bootstrap --no-example` wires up path overrides for the five workspace
#   packages (the four libraries + the top-level `example`) but skips the
#   auto-generated per-plugin example harnesses, which can't be resolved before
#   the packages are published (their hosted version constraints aren't on
#   pub.dev yet).
# * Analyze/test iterate the real packages explicitly to avoid those harnesses.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: melos bootstrap --no-example

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: |
          set -e
          for p in callbundle_platform_interface callbundle_android callbundle_ios callbundle example; do
            echo "::group::analyze $p"
            (cd "$p" && flutter analyze)
            echo "::endgroup::"
          done

      - name: Test
        run: |
          set -e
          for p in callbundle_platform_interface callbundle_android callbundle_ios callbundle; do
            if [ -d "$p/test" ]; then
              echo "::group::test $p"
              (cd "$p" && flutter test)
              echo "::endgroup::"
            fi
          done

  build-android-example:
    name: Build Android example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: melos bootstrap --no-example

      - name: Build example APK (validates Android/Kotlin)
        working-directory: example
        run: flutter build apk --debug
